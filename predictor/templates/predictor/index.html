<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Tumor Detection</title>
    <!-- Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.3/dist/tailwind.min.css" rel="stylesheet">
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body class="min-h-screen bg-cover bg-center relative" 
      style="background-image: url('https://images.unsplash.com/photo-1581091012184-9b88f6bfb03a?auto=format&fit=crop&w=1950&q=80');">
    
    <!-- Overlay -->
    <div class="absolute inset-0 bg-black bg-opacity-50"></div>

    <!-- Main content -->
    <div class="relative z-10 flex items-center justify-center min-h-screen">
        <!-- Card -->
        <div class="bg-white bg-opacity-90 shadow-2xl rounded-3xl p-10 max-w-lg w-full animate__animated animate__fadeInDown">
            <h1 class="text-4xl font-bold text-center mb-6 text-purple-700">Brain Tumor Detection</h1>

            <div class="mb-4 text-center">
                <img id="preview" src="" alt="Image Preview" class="mx-auto rounded-xl shadow-lg hidden w-64 h-64 object-cover">
            </div>

            <form method="POST" enctype="multipart/form-data" class="flex flex-col items-center">
                {% csrf_token %}
                <input type="file" name="image" accept="image/*" required onchange="previewImage(event)" 
                       class="mb-4 p-2 border-2 border-purple-300 rounded-lg w-full text-purple-700"/>
                <button type="submit" 
                        class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-6 rounded-full transition transform hover:scale-105">
                    Predict
                </button>
            </form>

            {% if prediction %}
            <div class="mt-6 p-4 bg-purple-100 rounded-xl text-center animate__animated animate__bounceIn">
                <h2 class="text-2xl font-semibold text-purple-800">Prediction: {{ prediction }}</h2>
            </div>
            {% endif %}
        </div>
    </div>

    <script>
        function previewImage(event) {
            const preview = document.getElementById('preview');
            preview.src = URL.createObjectURL(event.target.files[0]);
            preview.classList.remove('hidden');
        }
    </script>

</body>
</html>
